<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PEPTQ Label Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Montserrat, sans-serif;
background:#f4f6f8;
margin:20px;
}

h1{
margin-bottom:10px;
}

.controls{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
margin-bottom:20px;
}

input{
padding:6px;
margin:4px;
font-size:14px;
}

button{
padding:10px 16px;
background:#1F3C68;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2b528f;
}

.grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:12px;
}

.label{
width:260px;
height:110px;
background:white;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,.1);
position:relative;
padding:10px 14px;
overflow:hidden;
}

.leftbar{
position:absolute;
left:0;
top:0;
bottom:0;
width:12px;
background:#1F3C68;
border-top-left-radius:12px;
border-bottom-left-radius:12px;
}

.brand{
font-weight:600;
font-size:14px;
color:#1F3C68;
}

.brand span{
color:#F7941D;
}

.lot{
position:absolute;
right:12px;
top:10px;
font-size:11px;
color:#333;
}

.product{
font-weight:600;
font-size:18px;
margin-top:6px;
color:#1F3C68;
}

.strength{
font-size:14px;
margin-bottom:6px;
}

.purity{
background:#F7941D;
color:white;
font-size:12px;
padding:3px 6px;
border-radius:4px;
display:inline-block;
margin-bottom:4px;
}

.small{
font-size:11px;
color:#444;
line-height:1.2;
}

.barcode{
position:absolute;
right:6px;
top:30px;
width:26px;
height:60px;
background:repeating-linear-gradient(
90deg,
black,
black 2px,
white 2px,
white 4px
);
}

@media print{

.controls{
display:none;
}

body{
background:white;
}

.grid{
gap:6px;
}

.label{
box-shadow:none;
border:1px solid #ddd;
}

}

</style>
</head>

<body>

<h1>PEPTQ Label Generator (48)</h1>

<div class="controls">

Brand
<input id="brand" value="PEPTQ">

Product
<input id="product" value="RETATRUTIDE">

Strength
<input id="strength" value="10 mg / 3 mL">

Purity
<input id="purity" value="≥99% Purity (HPLC-Verified)">

Lot
<input id="lot" value="R1026-01">

Storage
<input id="storage" value="Store at 2–8°C">

<button onclick="generate()">Generate 48 Labels</button>

<button onclick="window.print()">Print</button>

</div>

<div id="labels" class="grid"></div>

<script>

function generate(){

let brand=document.getElementById("brand").value
let product=document.getElementById("product").value
let strength=document.getElementById("strength").value
let purity=document.getElementById("purity").value
let lot=document.getElementById("lot").value
let storage=document.getElementById("storage").value

let container=document.getElementById("labels")

container.innerHTML=""

for(let i=1;i<=48;i++){ 

let label=`

<div class="label">

<div class="leftbar"></div>

<div class="brand">
${brand.slice(0,-1)}<span>${brand.slice(-1)}</span>
</div>

<div class="lot">
LOT: ${lot}
</div>

<div class="product">
${product}
</div>

<div class="strength">
${strength}
</div>

<div class="purity">
${purity}
</div>

<div class="small">
Research Use Only
</div>

<div class="small">
${storage}
</div>

<div class="small">
Do not freeze. Protect from light.
</div>

<div class="barcode"></div>

</div>

`

container.innerHTML+=label

}

}

generate()

</script>

</body>
</html>
