<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEPTQ Label Generator</title>
</head>
<body>
    <h1>PEPTQ Label Generator</h1>
    <form id="label-form">
        <label for="peptq-field">Enter PEPTQ:</label>
        <input type="text" id="peptq-field" name="peptq-field" required>
        <button type="submit">Generate Label</button>
    </form>
    <div id="label-output"></div>

    <script>
        document.getElementById('label-form').onsubmit = function(event) {
            event.preventDefault();
            const peptqValue = document.getElementById('peptq-field').value;
            const labelOutput = document.getElementById('label-output');
            labelOutput.innerHTML = `<h2>Generated Label:</h2><p>${peptqValue}</p>`;
        };
    </script>
</body>
</html>
